# Builds release artifacts when a GitHub Release is published,
# then uploads binaries and install script to the release.
# Also publishes the crate to crates.io.

name: Release

permissions:
  contents: write

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Run CI checks before releasing
  ci:
    name: CI Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag format
        run: |
          tag="${{ github.event.release.tag_name }}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '${tag}' does not match vX.Y.Z format"
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Sync Cargo.toml version with tag
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="${tag#v}"
          sed -i "s/^version = \".*\"/version = \"${version}\"/" Cargo.toml
          echo "Cargo.toml version set to ${version}"

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features

  # Build release binaries for each target
  build:
    name: Build (${{ matrix.target }})
    needs: ci
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Sync Cargo.toml version with tag
        shell: bash
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="${tag#v}"
          sed -i'' -e "s/^version = \".*\"/version = \"${version}\"/" Cargo.toml
          echo "Cargo.toml version set to ${version}"

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          tag="${{ github.event.release.tag_name }}"
          archive="devin-mcp-${tag}-${{ matrix.target }}"
          mkdir -p "${archive}"
          cp "target/${{ matrix.target }}/release/devin-mcp" "${archive}/"
          cp README.md LICENSE "${archive}/"
          tar czf "${archive}.tar.gz" "${archive}"
          echo "ARCHIVE=${archive}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  # Upload binaries and install script to the GitHub Release
  release:
    name: Upload Release Assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare install script
        run: |
          tag="${{ github.event.release.tag_name }}"
          repo="${GITHUB_REPOSITORY}"
          cp scripts/installer.sh devin-mcp-installer.sh
          sed -i "s|__REPO__|${repo}|g" devin-mcp-installer.sh
          sed -i "s|__TAG__|${tag}|g" devin-mcp-installer.sh
          chmod +x devin-mcp-installer.sh

      - name: Upload Release Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.event.release.tag_name }}"
          gh release upload "${tag}" --clobber \
            artifacts/*.tar.gz \
            devin-mcp-installer.sh

  # Publish crate to crates.io
  publish:
    name: Publish to crates.io
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Sync Cargo.toml version with tag
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="${tag#v}"
          sed -i "s/^version = \".*\"/version = \"${version}\"/" Cargo.toml
          echo "Cargo.toml version set to ${version}"

      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
