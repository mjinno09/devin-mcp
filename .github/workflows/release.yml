# This file was autogenerated by cargo-dist (modified for devin-mcp)
# It builds release artifacts when a version tag (v*) is pushed.

name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - v[0-9]+.*

env:
  CARGO_TERM_COLOR: always

jobs:
  # Run CI checks before releasing
  ci:
    name: CI Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features

      - name: Unit tests
        run: cargo test --bin devin-mcp

      - name: Build binary
        run: cargo build

      - name: Integration tests (mock only)
        run: cargo test --test integration

  # Build release binaries for each target
  build:
    name: Build (${{ matrix.target }})
    needs: ci
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          archive="devin-mcp-${tag}-${{ matrix.target }}"
          mkdir -p "${archive}"
          cp "target/${{ matrix.target }}/release/devin-mcp" "${archive}/"
          cp README.md LICENSE "${archive}/"
          tar czf "${archive}.tar.gz" "${archive}"
          echo "ARCHIVE=${archive}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  # Create GitHub Release and upload all artifacts
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate install script
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          repo="${GITHUB_REPOSITORY}"
          cat > devin-mcp-installer.sh << 'INSTALLER'
          #!/bin/sh
          set -eu

          REPO="__REPO__"
          TAG="__TAG__"

          detect_target() {
            os="$(uname -s)"
            arch="$(uname -m)"

            case "${os}" in
              Linux)  os_part="unknown-linux-gnu" ;;
              Darwin) os_part="apple-darwin" ;;
              *)      echo "Unsupported OS: ${os}" >&2; exit 1 ;;
            esac

            case "${arch}" in
              x86_64|amd64)   arch_part="x86_64" ;;
              aarch64|arm64)  arch_part="aarch64" ;;
              *)              echo "Unsupported architecture: ${arch}" >&2; exit 1 ;;
            esac

            echo "${arch_part}-${os_part}"
          }

          target="$(detect_target)"
          archive="devin-mcp-${TAG}-${target}.tar.gz"
          url="https://github.com/${REPO}/releases/download/${TAG}/${archive}"

          echo "Downloading devin-mcp ${TAG} for ${target}..."

          tmpdir="$(mktemp -d)"
          trap 'rm -rf "${tmpdir}"' EXIT

          curl --proto '=https' --tlsv1.2 -sSfL "${url}" -o "${tmpdir}/${archive}"
          tar xzf "${tmpdir}/${archive}" -C "${tmpdir}"

          install_dir="${HOME}/.cargo/bin"
          mkdir -p "${install_dir}"
          cp "${tmpdir}/devin-mcp-${TAG}-${target}/devin-mcp" "${install_dir}/devin-mcp"
          chmod +x "${install_dir}/devin-mcp"

          echo ""
          echo "devin-mcp ${TAG} installed to ${install_dir}/devin-mcp"
          echo ""
          if echo "${PATH}" | tr ':' '\n' | grep -qx "${install_dir}"; then
            echo "Run 'devin-mcp --help' to get started."
          else
            echo "Add ${install_dir} to your PATH, then run 'devin-mcp --help'."
          fi
          INSTALLER

          sed -i "s|__REPO__|${repo}|g" devin-mcp-installer.sh
          sed -i "s|__TAG__|${tag}|g" devin-mcp-installer.sh
          chmod +x devin-mcp-installer.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "${tag}" \
            --title "${tag}" \
            --generate-notes \
            artifacts/*.tar.gz \
            devin-mcp-installer.sh
