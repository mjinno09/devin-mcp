# Builds release artifacts when a GitHub Release is published,
# then uploads binaries and install script to the release.
# Automatically syncs Cargo.toml version from the vX.Y.Z tag.

name: Release

permissions:
  contents: write

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Run CI checks before releasing
  ci:
    name: CI Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag format
        run: |
          tag="${{ github.event.release.tag_name }}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '${tag}' does not match vX.Y.Z format"
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Sync Cargo.toml version with tag
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="${tag#v}"
          sed -i "s/^version = \".*\"/version = \"${version}\"/" Cargo.toml
          echo "Cargo.toml version set to ${version}"

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features

  # Build release binaries for each target
  build:
    name: Build (${{ matrix.target }})
    needs: ci
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Sync Cargo.toml version with tag
        shell: bash
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="${tag#v}"
          sed -i'' -e "s/^version = \".*\"/version = \"${version}\"/" Cargo.toml
          echo "Cargo.toml version set to ${version}"

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          tag="${{ github.event.release.tag_name }}"
          archive="devin-mcp-${tag}-${{ matrix.target }}"
          mkdir -p "${archive}"
          cp "target/${{ matrix.target }}/release/devin-mcp" "${archive}/"
          cp README.md LICENSE "${archive}/"
          tar czf "${archive}.tar.gz" "${archive}"
          echo "ARCHIVE=${archive}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  # Upload binaries and install script to the GitHub Release
  release:
    name: Upload Release Assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare install script
        run: |
          tag="${{ github.event.release.tag_name }}"
          repo="${GITHUB_REPOSITORY}"
          cp scripts/installer.sh devin-mcp-installer.sh
          sed -i "s|__REPO__|${repo}|g" devin-mcp-installer.sh
          sed -i "s|__TAG__|${tag}|g" devin-mcp-installer.sh
          chmod +x devin-mcp-installer.sh

      - name: Upload Release Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.event.release.tag_name }}"
          gh release upload "${tag}" --clobber \
            artifacts/*.tar.gz \
            devin-mcp-installer.sh

  # Update Homebrew tap Formula
  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Compute SHA256 for release assets
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="${tag#v}"
          base="https://github.com/mjinno09/devin-mcp/releases/download/${tag}"

          curl -sL "${base}/devin-mcp-${tag}-aarch64-apple-darwin.tar.gz" -o arm64.tar.gz
          curl -sL "${base}/devin-mcp-${tag}-x86_64-apple-darwin.tar.gz" -o x64_mac.tar.gz
          curl -sL "${base}/devin-mcp-${tag}-x86_64-unknown-linux-gnu.tar.gz" -o x64_linux.tar.gz

          echo "SHA_ARM64=$(sha256sum arm64.tar.gz | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "SHA_X64_MAC=$(sha256sum x64_mac.tar.gz | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "SHA_X64_LINUX=$(sha256sum x64_linux.tar.gz | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "VERSION=${version}" >> "$GITHUB_ENV"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: mjinno09/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update Formula
        run: |
          cat > tap/Formula/devin-mcp.rb << 'FORMULA'
          class DevinMcp < Formula
            desc "MCP server for creating and managing Devin AI sessions"
            homepage "https://github.com/mjinno09/devin-mcp"
            version "__VERSION__"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/mjinno09/devin-mcp/releases/download/v#{version}/devin-mcp-v#{version}-aarch64-apple-darwin.tar.gz"
                sha256 "__SHA_ARM64__"
              else
                url "https://github.com/mjinno09/devin-mcp/releases/download/v#{version}/devin-mcp-v#{version}-x86_64-apple-darwin.tar.gz"
                sha256 "__SHA_X64_MAC__"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "https://github.com/mjinno09/devin-mcp/releases/download/v#{version}/devin-mcp-v#{version}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "__SHA_X64_LINUX__"
              end
            end

            def install
              bin.install "devin-mcp"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/devin-mcp --version")
            end
          end
          FORMULA

          sed -i "s/__VERSION__/${VERSION}/g" tap/Formula/devin-mcp.rb
          sed -i "s/__SHA_ARM64__/${SHA_ARM64}/g" tap/Formula/devin-mcp.rb
          sed -i "s/__SHA_X64_MAC__/${SHA_X64_MAC}/g" tap/Formula/devin-mcp.rb
          sed -i "s/__SHA_X64_LINUX__/${SHA_X64_LINUX}/g" tap/Formula/devin-mcp.rb

      - name: Commit and push Formula
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/devin-mcp.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update devin-mcp to ${VERSION}"
          git push origin main

  # Commit updated Cargo.toml and Cargo.lock back to main
  update-version:
    name: Commit Version to main
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Sync Cargo.toml version with tag
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="${tag#v}"
          sed -i "s/^version = \".*\"/version = \"${version}\"/" Cargo.toml
          echo "Cargo.toml version set to ${version}"

      - name: Update Cargo.lock
        run: cargo update --workspace

      - name: Commit and push
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="${tag#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump version to ${version}"
          git push origin main
